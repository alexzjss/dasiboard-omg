server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Chamadas à API não devem ser respondidas pelo nginx da SPA.
    # Se chegarem aqui, significa que o BASE_URL do axios está errado
    # ou o proxy externo não está configurado. Retorna 502 explícito
    # para o axios receber err.response (não erro de rede silencioso).
    location /api/ {
        return 502 '{"detail":"API proxy not configured. Check VITE_API_URL or nginx routing."}';
        add_header Content-Type application/json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
