<!DOCTYPE html>
<html lang="pt-BR" data-theme="padrao">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="description" content="Dashboard acadêmico para o curso de Sistemas de Informação — USP/EACH" />
    <meta name="theme-color" content="#0b0b0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DaSIboard" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="/assets/logo-dasi.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>DaSIboard — SI-USP</title>
    <!-- Aplica tema salvo antes da primeira pintura (elimina FOUC) -->
    <script>
      (function () {
        var t = localStorage.getItem('dasitheme') || 'padrao';
        document.documentElement.setAttribute('data-theme', t);
        if (localStorage.getItem('dasiLiteMode') === '1')
          document.documentElement.setAttribute('data-lite', '1');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
