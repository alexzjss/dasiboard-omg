server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Chamadas à API não devem ser respondidas pelo nginx da SPA.
    # O proxy reverso externo (nginx service) já encaminha /api/ → backend.
    # Se chegarem aqui, retorna 502 explícito para facilitar diagnóstico.
    location /api/ {
        add_header Content-Type application/json;
        return 502 '{"detail":"API proxy not configured. Check nginx routing."}';
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets estáticos com cache longo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
